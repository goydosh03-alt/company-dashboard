<!-- UPLOAD MODAL -->
<div class="overlay" id="uploadOverlay">
  <div class="modal">
    <div class="mh"><b id="modalTitle">Upload a plugin</b><span class="material-symbols-outlined x" onclick="closeUpload()">close</span></div>
    <div class="mb">
      <div class="drop" id="upDrop" onclick="document.getElementById('upFile').click()">
        <span class="material-symbols-outlined">cloud_upload</span>
        <b id="upDropTitle">Drop a .zip or click to browse</b>
        <span id="upDropHint">Plugin archive (.zip)</span>
        <input type="file" id="upFile" accept=".zip" hidden>
      </div>
      <div class="field"><label>Plugin name</label><input id="upName" placeholder="Auto-filled from the .zip — editable"></div>
      <div class="field"><label>Description <span style="color:var(--text-3);font-weight:400">(optional)</span></label><input id="upDesc" placeholder="What this plugin does"></div>
      <div class="field"><label>Uploaded by</label>
        <div class="dd" id="upBy" data-value="Oleksandr Hoidosh">
          <button type="button" class="dd-btn" onclick="ddToggle(event)"><span class="dd-label">Oleksandr Hoidosh</span><span class="material-symbols-outlined">unfold_more</span></button>
          <div class="dd-menu">
            <div class="dd-opt" onclick="ddPick(this)">Oleksandr Hoidosh</div>
            <div class="dd-opt" onclick="ddPick(this)">Diana Hurska</div>
            <div class="dd-opt" onclick="ddPick(this)">Aleksandr Tsarenko</div>
            <div class="dd-opt" onclick="ddPick(this)">Kateryna Yefemenko</div>
            <div class="dd-opt" onclick="ddPick(this)">Pavlo Semenishin</div>
          </div>
        </div>
      </div>
    </div>
    <div class="mf">
      <button class="btn btn-ghost" onclick="closeUpload()">Cancel</button>
      <button class="btn btn-primary" onclick="submitUpload()"><span class="material-symbols-outlined">upload</span> Upload</button>
    </div>
  </div>
</div>
