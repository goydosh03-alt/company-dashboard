<!-- ADD FIGMA FILE MODAL -->
<div class="overlay" id="figmaOverlay">
  <div class="modal">
    <div class="mh"><b id="figmaTitle">Add Figma file</b><span class="material-symbols-outlined x" onclick="closeFigma()">close</span></div>
    <div class="mb">
      <div class="field"><label>File name</label><input id="fgName" placeholder="e.g. Native — Home redesign"></div>
      <div class="field"><label>Market</label>
        <select id="fgMarket">
          <option>Native</option><option>Kazakhstan</option><option>COM</option><option>Bangladesh</option><option>Africa</option>
        </select>
      </div>
      <div class="field"><label>Figma link</label><input id="fgLink" placeholder="https://www.figma.com/file/..."></div>
      <div class="field"><label>Short description (optional)</label><input id="fgDesc" placeholder="What's inside"></div>
    </div>
    <div class="mf">
      <button class="btn btn-ghost" onclick="closeFigma()">Cancel</button>
      <button class="btn btn-primary" onclick="submitFigma()"><span class="material-symbols-outlined">add</span> Add file</button>
    </div>
  </div>
</div>
