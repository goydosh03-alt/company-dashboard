<div class="page-head">
  <div><h2>Plugins</h2><p>Team tools. Upload a .zip, others browse and download.</p></div>
  <button class="up-btn" onclick="openUpload()"><span class="material-symbols-outlined">upload</span> Upload plugin</button>
</div>
<div class="search-row">
  <span class="material-symbols-outlined">search</span>
  <input id="pluginSearch" placeholder="Search plugins by name…" oninput="filterPlugins(this.value)">
</div>
<div class="pgrid" id="pluginGrid"></div>
<div class="empty" id="pluginEmpty" style="display:none">No plugins yet — click “Upload plugin”.</div>
